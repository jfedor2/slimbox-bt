name: release
permissions:
  contents: write
on:
  push:
    tags: 'r*'
jobs:
  build:
    uses: ./.github/workflows/build.yml
  create-release:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: download
      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda
        with:
          draft: true
          files: download/*
